<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PluviTech Central V5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body>

    <div class="container">
        <header>
            <h1>PLUVITECH <span class="version">V5-BLE</span></h1>
            <p>Controle com Feedback Real</p>
        </header>

        <section class="control-card">
            <button class="btn-ble" id="btn-conectar" onclick="conectarBluetooth()">
                CONECTAR BLUETOOTH
            </button>
            <div id="status">Status: Desconectado</div>

            <div id="indicador-status" class="status-box">
                AGUARDANDO CONEXÃO
            </div>

            <div class="button-group">
                <button class="btn btn-on" onclick="executarAcao('BOMBA_01', 'LIGAR')">LIGAR</button>
                <button class="btn btn-off" onclick="executarAcao('BOMBA_01', 'DESLIGAR')">DESLIGAR</button>
            </div>
        </section>

        <section class="log-section">
            <h3>Histórico de Comandos</h3>
            <div id="lista-logs" class="log-container"></div>
            <button onclick="limparHistorico()" class="btn-clear">LIMPAR HISTÓRICO</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
